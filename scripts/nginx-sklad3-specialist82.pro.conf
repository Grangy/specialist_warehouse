# Reverse proxy → Next.js (pm2) на 127.0.0.1:3000
# Скопировать на сервер: /etc/nginx/sites-available/sklad3.specialist82.pro
#
# Кэш публичного /api/statistics/top (опционально, после proxy_cache_path в http {}):
#   proxy_cache_path /var/cache/nginx/sklad-top levels=1:2 keys_zone=SKLAD_TOP:10m max_size=80m inactive=2h;
# В server { } можно добавить (раскомментировать, когда зона SKLAD_TOP заведена):
#   location /api/statistics/top {
#     proxy_cache SKLAD_TOP; proxy_cache_valid 200 30s;
#     proxy_cache_key "$scheme$host$request_uri";
#     proxy_cache_methods GET; add_header X-Top-Nginx-Cache $upstream_cache_status;
#     proxy_pass http://127.0.0.1:3000;
#     proxy_set_header Host $host; ...
#   }

server {
    server_name sklad3.specialist82.pro;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    listen [::]:443 ssl ipv6only=on;
    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/sklad3.specialist82.pro/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sklad3.specialist82.pro/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    listen 80;
    listen [::]:80;
    server_name sklad3.specialist82.pro;
    return 301 https://$host$request_uri;
}
